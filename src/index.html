<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Data Visualisaties</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    // Restore path encoded by 404.html redirect
    (function(l) {
      if (l.search[1] === 'p') {
        var decoded = l.search.slice(1).split('&').reduce(function(acc, s) {
          var kv = s.split('=');
          if (kv[0] === 'p') acc.path = kv[1].replace(/~and~/g, '&');
          if (kv[0] === 'q') acc.query = '?' + kv[1].replace(/~and~/g, '&');
          return acc;
        }, { path: '', query: '' });
        window.history.replaceState(null, null,
          l.pathname.replace(/\/$/, '') + '/' + decoded.path + decoded.query + l.hash
        );
      }
    }(window.location));
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
