<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Data Visualisaties</title>
  <script>
    // GitHub Pages SPA redirect: encode the path into a query string
    // pathSegmentsToKeep = 1 because the app lives at /data-visualisaties/
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
